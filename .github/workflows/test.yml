name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    # Unit tests don't need a Shamela install or the JVM helper — run on any
    # vanilla runner. Integration tests are deferred until we have a runner
    # spec that can host a Shamela database (see CLAUDE.md "Testing rules").
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run test:unit
